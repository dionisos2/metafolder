# Default keybindings shipped with the metafolder GUI.
# Copy entries you want to change into your own
# ~/.config/metafolder-gui/keybindings.toml — the user file only needs the
# overrides, it is merged over these defaults at startup.

# Command input (spec default suggestion).
":" = { command = "command-input:activate" }

# Text editing (fire even while a text input is focused).
"escape" = { command = "editing:unfocus", text-input = true }
"enter" = { command = "editing:confirm", text-input = true }
"ctrl+a" = { command = "editing:goto-line-start", text-input = true }
"ctrl+e" = { command = "editing:goto-line-end", text-input = true }

# Tabs (spec default suggestions: t, w, 1..9).
"t" = { command = "tab:new" }
"w" = { command = "tab:close" }
"n" = { command = "tab:next" }
"p" = { command = "tab:prev" }
"1" = { command = "tab:goto-1" }
"2" = { command = "tab:goto-2" }
"3" = { command = "tab:goto-3" }
"4" = { command = "tab:goto-4" }
"5" = { command = "tab:goto-5" }
"6" = { command = "tab:goto-6" }
"7" = { command = "tab:goto-7" }
"8" = { command = "tab:goto-8" }
"9" = { command = "tab:goto-9" }

# Panel slots. panel:split is available via the command input.
"v" = { command = "panel:split-toggle" }
"c" = { command = "panel:unsplit" }
"o" = { command = "panel:focus-next" }

# Panel types suggest their own keybindings (metafolder.addKeybinding);
# they are the weakest layer, so an entry here overrides them. Scope it
# to the panel type with `when`, e.g. to rebind record-list's "open in
# the other panel" from enter to l:
# "l" = { command = "record-list:open", when = "record-list" }
