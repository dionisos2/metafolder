<!doctype html>
<!-- Built-in panel type: metadata metarecords filtered by an embedded query
     (spec-gui "metarecord-list panel type"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>metarecord-list</title>
    <style>
      .mf-panel-body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
        font-size: 13px;
      }
      #query-editor {
        display: flex;
        flex-direction: column;
        padding: 6px;
        gap: 4px;
        background: var(--mf-bg-raised, #26262e);
      }
      .editor-row {
        display: flex;
        gap: 6px;
      }
      .editor-row input {
        flex: 1;
        font-family: var(--mf-font-mono, monospace);
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 3px 6px;
      }
      .editor-error {
        color: var(--mf-error, #c44c56);
        padding: 0 2px;
      }
      .editor-error:empty {
        display: none;
      }
      .editor-row input[readonly] {
        opacity: 0.55;
      }
      #normal-toggle {
        font-size: 11px;
        white-space: nowrap;
      }
      .freeze-label {
        display: flex;
        align-items: center;
        gap: 3px;
        white-space: nowrap;
        color: var(--mf-fg-dim, #8a8a96);
      }
      #bulk-open {
        font-size: 11px;
        white-space: nowrap;
        margin-right: 8px;
      }
      #bulk-form {
        display: none;
        flex-direction: column;
        gap: 4px;
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 6px;
      }
      #bulk-form.open {
        display: flex;
      }
      #bulk-form .editor-row {
        align-items: center;
      }
      #bulk-form #bulk-value {
        flex: 1;
        display: flex;
        gap: 4px;
      }
      #bulk-form #bulk-value input {
        flex: 1;
      }
      #bulk-form select {
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 3px 6px;
      }
      #scroll {
        flex: 1;
        overflow-y: auto;
      }
      table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }
      th {
        position: sticky;
        top: 0;
        text-align: left;
        background: var(--mf-bg-raised, #26262e);
        padding: 4px 8px;
        cursor: pointer;
        user-select: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      th .col-resize {
        position: absolute;
        top: 0;
        right: 0;
        width: 6px;
        height: 100%;
        cursor: col-resize;
      }
      th .col-resize:hover {
        background: var(--mf-accent, #4c56c4);
      }
      td {
        padding: 3px 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      tr.row {
        cursor: pointer;
      }
      tr.row:hover {
        background: var(--mf-bg-raised, #26262e);
      }
      tr.cursor {
        outline: 1px solid var(--mf-accent, #4c56c4);
      }
      tr.checked td:first-child::before {
        content: '✓ ';
        color: var(--mf-ok, #56c44c);
      }
      /* orphaned metarecords: the tracked file no longer exists on disk */
      tr.orphan td,
      .card.orphan .name {
        color: var(--mf-orphan, #b07ad6);
      }
      #grid {
        display: none;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
        padding: 8px;
      }
      .mf-panel-body.grid #grid {
        display: grid;
      }
      .mf-panel-body.grid table {
        display: none;
      }
      .card {
        border: 1px solid var(--mf-bg-raised, #26262e);
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
      }
      .card.cursor {
        outline: 2px solid var(--mf-accent, #4c56c4);
      }
      .card img {
        width: 100%;
        height: 110px;
        object-fit: cover;
        display: block;
        background: var(--mf-bg-raised, #26262e);
      }
      .card .glyph {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 110px;
        font-size: 2.5rem;
        color: var(--mf-fg-dim, #8a8a96);
        background: var(--mf-bg-raised, #26262e);
      }
      .card .name {
        padding: 4px 6px;
        font-size: 0.85em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #footer {
        display: flex;
        align-items: center;
        background: var(--mf-bg-raised, #26262e);
      }
      #status-line {
        flex: 1;
        padding: 3px 8px;
        color: var(--mf-fg-dim, #8a8a96);
        font-size: 0.9em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .placeholder {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        color: var(--mf-fg-dim, #8a8a96);
      }
      /* author display rules override the [hidden] UA style */
      .placeholder[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="query-editor" data-help-topic="edit-query">
      <div class="editor-row">
        <input id="query-input" placeholder='simplified query, e.g. fav genre=jazz (empty = all)' />
        <button id="query-apply">Apply</button>
        <button id="normal-toggle" type="button">Show normal DSL</button>
      </div>
      <div id="query-error" class="editor-error"></div>
      <div id="normal-editor" hidden>
        <div class="editor-row">
          <input id="normal-input" readonly placeholder="normal DSL" />
          <label class="freeze-label" title="Freeze to edit the normal DSL by hand; it then drives the query. Unfreeze to mirror the simplified query again.">
            <input id="normal-freeze" type="checkbox" /> Freeze
          </label>
        </div>
        <div id="normal-error" class="editor-error"></div>
      </div>
      <div class="editor-row">
        <input
          id="columns-input"
          data-help-topic="columns"
          placeholder="columns, e.g. mfr_path~ rating &amp;version"
          title="space- or comma-separated columns: field (raw value), field~ (resolved: TreeRef shows the path from the root), field~name (Ref shows the target's field), &amp;uuid / &amp;version (metarecord metadata); empty restores the defaults"
        />
        <button id="columns-apply">Apply</button>
      </div>
      <div id="columns-error" class="editor-error"></div>
    </div>
    <div id="scroll">
      <p class="placeholder" id="no-repo" hidden>No active repository — use the repos panel.</p>
      <table>
        <thead>
          <tr id="header-row"></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="grid"></div>
    </div>
    <div id="bulk-form">
      <div class="editor-row">
        <select id="bulk-op" title="set: replace all rows · append: add a row · remove: delete rows equal to this value · unset: remove the field entirely">
          <option value="set">Set (replace all rows)</option>
          <option value="append">Append (add a row)</option>
          <option value="remove">Remove (delete matching rows)</option>
          <option value="unset">Unset (remove the field)</option>
        </select>
        <input id="bulk-name" placeholder="field name, e.g. rating" />
        <button id="bulk-type" type="button">string ▾</button>
      </div>
      <div class="editor-row" id="bulk-value-row">
        <span id="bulk-value"></span>
      </div>
      <div class="editor-row">
        <label class="freeze-label" title="Required to write reserved mfr_* fields">
          <input id="bulk-force" type="checkbox" /> Force
        </label>
        <button id="bulk-apply">Apply</button>
        <button id="bulk-cancel" type="button">Cancel</button>
      </div>
      <div id="bulk-error" class="editor-error"></div>
    </div>
    <div id="footer">
      <div id="status-line"></div>
      <button id="bulk-open" type="button" title="Set, append, remove, or unset a field on every metarecord matching the current query">Edit field on query…</button>
    </div>
  </body>
</html>
