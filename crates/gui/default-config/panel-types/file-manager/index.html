<!doctype html>
<!-- Built-in panel type: filesystem tree navigator with tracked/untracked
     distinction (spec-gui "file-manager panel type"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>file-manager</title>
    <style>
      .mf-panel-body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
        font-size: 13px;
      }
      #toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 4px 8px;
        background: var(--mf-bg-raised, #26262e);
        flex-wrap: wrap;
      }
      #current-path {
        flex: 1;
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.85em;
        color: var(--mf-fg-dim, #8a8a96);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      button {
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 1px 8px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
      }
      label {
        color: var(--mf-fg-dim, #8a8a96);
        font-size: 0.9em;
      }
      #listing {
        flex: 1;
        overflow-y: auto;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 4px 0;
      }
      li {
        display: flex;
        gap: 8px;
        padding: 2px 10px;
        cursor: pointer;
        align-items: baseline;
      }
      li:hover {
        background: var(--mf-bg-raised, #26262e);
      }
      li.cursor {
        outline: 1px solid var(--mf-accent, #4c56c4);
      }
      .icon {
        width: 1.5em;
        flex: none;
        text-align: center;
      }
      .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      li.tracked .name {
        color: var(--mf-ok, #56c44c);
      }
      /* .metafolder/internal: hard-excluded from tracking (live database). */
      li.internal .name,
      li.internal .badge {
        color: var(--mf-error, #c44c56);
      }
      .badge {
        font-size: 0.8em;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .placeholder {
        padding: 20px;
        text-align: center;
        color: var(--mf-fg-dim, #8a8a96);
      }
      #status-line {
        padding: 2px 10px;
        border-top: 1px solid var(--mf-bg-raised, #26262e);
        color: var(--mf-fg-dim, #8a8a96);
        font-size: 0.85em;
      }
    </style>
  </head>
  <body>
    <div id="toolbar" data-help-topic="file-manager">
      <button id="up">↑ up</button>
      <button id="goto-root">repo root</button>
      <button id="refresh">⟳ refresh</button>
      <button id="add" disabled>Add to DB</button>
      <label><input type="checkbox" id="constrain" checked /> constrain to repo root</label>
      <label><input type="checkbox" id="show-hidden" /> hidden files</label>
      <span id="current-path"></span>
    </div>
    <div id="listing" data-help-topic="file-manager">
      <p class="placeholder" id="placeholder">Loading…</p>
      <ul id="entries"></ul>
    </div>
    <div id="status-line"></div>
  </body>
</html>
