<!doctype html>
<!-- Built-in panel type: append-only log of status messages, shell
     output and reconcile results (spec-gui "Message view"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>message</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-size: 13px;
      }
      #toolbar {
        padding: 4px 8px;
        background: var(--mf-bg-raised, #26262e);
      }
      button {
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 1px 8px;
        cursor: pointer;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        margin: 0;
        padding: 6px 8px;
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.9em;
      }
      .line {
        white-space: pre-wrap;
        word-break: break-all;
      }
      .ts {
        color: var(--mf-fg-dim, #8a8a96);
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div id="toolbar"><button id="clear">Clear (message:clear)</button></div>
    <div id="log"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
