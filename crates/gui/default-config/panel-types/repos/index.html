<!doctype html>
<!-- Built-in panel type: repository list, init and load (spec-gui
     "Repository management"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>repos</title>
    <style>
      .mf-panel-body {
        margin: 0;
        padding: 10px;
        font-size: 14px;
        height: 100%;
        overflow: auto;
        box-sizing: border-box;
      }
      h2 {
        font-size: 1em;
        color: var(--mf-fg-dim, #8a8a96);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
      }
      li:hover,
      li.selected {
        background: var(--mf-bg-raised, #26262e);
      }
      /* A repository entry is a block: a clickable header plus a task list. */
      li.repo {
        display: block;
        padding: 0;
        cursor: default;
      }
      li.repo:hover {
        background: transparent;
      }
      .repo-head {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
      }
      .repo-head:hover {
        background: var(--mf-bg-raised, #26262e);
      }
      .repo-unload {
        padding: 1px 8px;
        font-size: 0.85em;
      }
      .repo-tasks {
        padding: 0 8px 4px 20px;
      }
      .repo-task {
        justify-content: space-between;
        padding: 2px 6px;
        font-size: 0.85em;
        color: var(--mf-fg-dim, #8a8a96);
        cursor: default;
      }
      .repo-task:hover {
        background: transparent;
      }
      .task-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .task-stop {
        padding: 1px 8px;
        font-size: 0.9em;
        border-color: var(--mf-error, #c44c56);
        color: var(--mf-error, #c44c56);
      }
      .uuid {
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.85em;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .root {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .actions {
        display: flex;
        gap: 8px;
        margin: 12px 0;
      }
      button {
        font: inherit;
        background: var(--mf-bg-raised, #26262e);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
      }
      form {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 8px 12px;
        align-items: center;
        margin: 12px 0;
        padding: 10px;
        background: var(--mf-bg-raised, #26262e);
        border-radius: 6px;
      }
      form.hidden {
        display: none;
      }
      input,
      form select {
        font: inherit;
        font-family: var(--mf-font-mono, monospace);
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 3px 6px;
      }
      .form-caption {
        grid-column: 1 / -1;
        margin: 0;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .form-actions {
        grid-column: 2;
        display: flex;
        gap: 8px;
      }
      .path-input {
        display: flex;
        gap: 6px;
      }
      .path-input input {
        flex: 1;
      }
      .error {
        grid-column: 1 / -1;
        color: var(--mf-error, #c44c56);
      }
      /* Folder picker shared by the init/load forms. */
      .browser {
        margin: 12px 0;
        padding: 10px;
        background: var(--mf-bg-raised, #26262e);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 6px;
      }
      .browser.hidden {
        display: none;
      }
      .browser-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      #browser-path {
        flex: 1;
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.85em;
        color: var(--mf-fg-dim, #8a8a96);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #browser-list {
        max-height: 220px;
        overflow-y: auto;
        margin: 0 0 8px;
      }
      #browser-list li {
        gap: 8px;
        padding: 3px 6px;
      }
      #browser-list .icon {
        width: 1.2em;
      }
      .browser-empty {
        padding: 8px 6px;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .empty {
        color: var(--mf-fg-dim, #8a8a96);
      }
    </style>
  </head>
  <body>
    <h2>Repositories</h2>
    <ul id="repo-list"></ul>
    <p id="empty" class="empty" hidden>No repository loaded in the daemon.</p>

    <div class="actions">
      <button id="show-init">Init new repo…</button>
      <button id="show-load">Load repo…</button>
      <button id="refresh">Refresh</button>
    </div>

    <form id="init-form" class="hidden">
      <label for="init-name">Name</label>
      <input id="init-name" placeholder="(defaults to the folder name)" />
      <label for="init-root">Root directory</label>
      <div class="path-input">
        <input id="init-root" placeholder="/path/to/files" required />
        <button type="button" class="browse" data-target="init-root">Browse…</button>
      </div>
      <div class="form-actions">
        <button type="submit">Initialize</button>
        <button type="button" class="cancel">Cancel</button>
      </div>
      <p class="error" id="init-error"></p>
    </form>

    <form id="load-form" class="hidden">
      <label for="load-root">Root directory</label>
      <div class="path-input">
        <input id="load-root" placeholder="/path/to/files" required />
        <button type="button" class="browse" data-target="load-root">Browse…</button>
      </div>
      <div class="form-actions">
        <button type="submit">Load</button>
        <button type="button" class="cancel">Cancel</button>
      </div>
      <p class="error" id="load-error"></p>
    </form>

    <form id="retype-form" class="hidden">
      <p class="form-caption" id="retype-target"></p>
      <label for="retype-name">Field name</label>
      <input id="retype-name" placeholder="e.g. rating" required />
      <label for="retype-type">New type</label>
      <select id="retype-type">
        <option value="string">string</option>
        <option value="int">int</option>
        <option value="float">float</option>
        <option value="bool">bool</option>
        <option value="datetime">datetime</option>
        <option value="ref">ref</option>
        <option value="tree_ref">tree_ref</option>
        <option value="externalref">externalref</option>
        <option value="refbase">refbase</option>
      </select>
      <div class="form-actions">
        <button type="submit">Convert…</button>
        <button type="button" class="cancel">Cancel</button>
      </div>
      <p class="error" id="retype-error"></p>
    </form>

    <div id="browser" class="browser hidden">
      <div class="browser-bar">
        <button type="button" id="browser-up">↑ up</button>
        <span id="browser-path"></span>
      </div>
      <ul id="browser-list"></ul>
      <div class="form-actions" style="grid-column: auto">
        <button type="button" id="browser-pick">Use this folder</button>
        <button type="button" id="browser-cancel">Cancel</button>
      </div>
    </div>

  </body>
</html>
