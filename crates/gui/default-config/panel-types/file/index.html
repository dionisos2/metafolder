<!doctype html>
<!-- Built-in panel type: preview of the active path from selected_paths
     (spec-gui "file panel type"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>file</title>
    <style>
      .mf-panel-body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
        font-size: 13px;
      }
      #path-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 4px 8px;
        background: var(--mf-bg-raised, #26262e);
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.85em;
      }
      #path-bar select {
        flex: 1;
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
      }
      #path-bar span {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #path-bar button.nav {
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 0 8px;
        cursor: pointer;
      }
      #viewer {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
        min-height: 0;
      }
      #viewer img,
      #viewer video {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      #viewer pre {
        align-self: stretch;
        flex: 1;
        margin: 0;
        padding: 10px;
        overflow: auto;
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.9em;
        white-space: pre-wrap;
      }
      /* Directory view: the active path is a folder, show its contents. */
      #viewer .dir-grid {
        align-self: stretch;
        flex: 1;
        margin: 0;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
        align-content: start;
        overflow: auto;
      }
      .tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px;
        border: 1px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        background: none;
        color: inherit;
        font: inherit;
        text-align: center;
      }
      .tile:hover {
        background: var(--mf-bg-raised, #26262e);
        border-color: var(--mf-fg-dim, #8a8a96);
      }
      .tile .thumb {
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .tile .thumb img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .tile .glyph {
        font-size: 40px;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .tile .name {
        width: 100%;
        font-size: 0.85em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .placeholder {
        color: var(--mf-fg-dim, #8a8a96);
      }
    </style>
  </head>
  <body>
    <div id="path-bar" hidden></div>
    <div id="viewer"><p class="placeholder">No file selected</p></div>
  </body>
</html>
