<!doctype html>
<!-- Built-in panel type: preview of the active path from selected_paths
     (spec-gui "file panel type"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>file</title>
    <style>
      .mf-panel-body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
        font-size: 13px;
      }
      #path-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 4px 8px;
        background: var(--mf-bg-raised, #26262e);
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.85em;
      }
      #path-bar select {
        flex: 1;
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
      }
      #path-bar span {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #path-bar button.nav {
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 0 8px;
        cursor: pointer;
      }
      /* Media toolbar: zoom controls, shown only while an image/video is
         previewed (the file panel toggles its [hidden]). */
      #media-toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 4px 8px;
        background: var(--mf-bg-raised, #26262e);
        font-size: 0.85em;
      }
      #media-toolbar button {
        font: inherit;
        min-width: 28px;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
        border-radius: 3px;
        padding: 1px 8px;
        cursor: pointer;
      }
      #media-toolbar button:hover {
        background: var(--mf-bg-raised, #26262e);
      }
      #media-toolbar #zoom-label {
        min-width: 48px;
        text-align: center;
        font-family: var(--mf-font-mono, monospace);
        color: var(--mf-fg-dim, #8a8a96);
      }
      #viewer {
        flex: 1;
        display: flex;
        overflow: auto;
        min-height: 0;
      }
      /* margin:auto (rather than flex align/justify-center) keeps a zoomed-in
         image scrollable to its top-left edge instead of clipping it. */
      #viewer img,
      #viewer video {
        margin: auto;
      }
      /* Fit: fill the available box, aspect preserved (letterboxed). Default. */
      #viewer img.zoom-fit,
      #viewer video.zoom-fit {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      /* Manual zoom: explicit pixel size set inline, never clamped to the box. */
      #viewer img.zoom-manual,
      #viewer video.zoom-manual {
        max-width: none;
        max-height: none;
      }
      #viewer pre {
        align-self: stretch;
        flex: 1;
        margin: 0;
        padding: 10px;
        overflow: auto;
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.9em;
        white-space: pre-wrap;
      }
      /* Directory view: the active path is a folder, show its contents. */
      #viewer .dir-grid {
        align-self: stretch;
        flex: 1;
        margin: 0;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
        align-content: start;
        overflow: auto;
      }
      .tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px;
        border: 1px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        background: none;
        color: inherit;
        font: inherit;
        text-align: center;
      }
      .tile:hover {
        background: var(--mf-bg-raised, #26262e);
        border-color: var(--mf-fg-dim, #8a8a96);
      }
      .tile .thumb {
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .tile .thumb img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .tile .glyph {
        font-size: 40px;
        color: var(--mf-fg-dim, #8a8a96);
      }
      .tile .name {
        width: 100%;
        font-size: 0.85em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .placeholder {
        color: var(--mf-fg-dim, #8a8a96);
      }
      /* Directory grid footer: "200/5000" progressive-loading indicator. */
      #dir-footer {
        flex: 0 0 auto;
        padding: 2px 8px;
        background: var(--mf-bg-raised, #26262e);
        color: var(--mf-fg-dim, #8a8a96);
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.8em;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="path-bar" hidden></div>
    <div id="media-toolbar" hidden data-help-topic="media">
      <button id="zoom-out" title="Zoom out (-)">−</button>
      <button id="zoom-in" title="Zoom in (+)">+</button>
      <span id="zoom-label"></span>
      <button id="zoom-fit" title="Fit to available space (=)">⤢ Fit</button>
      <button id="zoom-reset" title="Original size (0)">1:1</button>
    </div>
    <div id="viewer" data-help-topic="file"><p class="placeholder">No file selected</p></div>
    <div id="dir-footer" hidden></div>
  </body>
</html>
