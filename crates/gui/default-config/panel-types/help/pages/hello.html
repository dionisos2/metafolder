<h1>Hello example panel</h1>
<p>
  A minimal example panel, the starting point for writing your own. Copy its
  directory under <code>~/.config/metafolder/gui/panel-types/&lt;name&gt;/</code>,
  edit <code>index.html</code> and <code>main.js</code> (which exports
  <code>mount(root, metafolder)</code>), and re-run
  <code>metafolder-sync-config</code> to install it.
</p>
