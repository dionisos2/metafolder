<h1>Workspace info panel</h1>
<p>
  Shows the current workspace's metadata: its name, active repository and stored
  variables. It is mostly useful when scripting the GUI or debugging panel
  state. Workspaces themselves are created and switched with the
  <code>tab:*</code> and <code>workspace:*</code> commands — see
  <a data-help-page="getting-started">getting started</a>.
</p>
