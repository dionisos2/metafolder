# Metafolder GUI settings (spec-config; spec-gui "Connection to the daemon").
# Installed into ~/.config/metafolder/gui/ by metafolder-sync-config.
# CLI flags (--daemon-port / --gui-port) override these at launch.

# Port of the daemon the GUI connects to (on 127.0.0.1, the only address the
# daemon listens on). Defaults to the daemon's own default port, so the GUI
# connects out of the box without any flag.
daemon-port = 7523

# Port the GUI's own HTTP server (panel assets + scripting API) binds. The
# `mf gui` CLI reads this same value to reach the GUI (no gui.port file).
gui-port = 7524

# Progressive list loading: how many rows/tiles each list panel renders per
# window before more are fetched/revealed on scroll (a footer shows
# "loaded/total"). Smallest for metarecord-list (each row needs several daemon
# round-trips and parsing), largest for file-manager (a plain text row is the
# cheapest to build); file sits in between (each tile is a lazy <img>).
[page-size]
metarecord-list = 100
file = 150
file-manager = 200

# Value picker seeds (spec-gui "Value picker" / "Picker seeds"). When a form
# opens a picker to fill a `ref` field, it can pre-filter the metarecord list
# with a query seeded by the field's name (the daemon does not record what a
# ref points to, so this cannot be inferred). Each value is written in the
# metarecord-list query box's syntax. Example:
# [picker-seeds]
# tag    = 'type = "tag"'
# author = 'type = "person"'
