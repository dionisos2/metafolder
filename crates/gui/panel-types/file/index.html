<!doctype html>
<!-- Built-in panel type: preview of the active path from selected_paths
     (spec-gui "file panel type"). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>file</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-size: 13px;
      }
      #path-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 4px 8px;
        background: var(--mf-bg-raised, #26262e);
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.85em;
      }
      #path-bar select {
        flex: 1;
        font: inherit;
        background: var(--mf-bg, #1e1e24);
        color: var(--mf-fg, #d8d8e0);
        border: 1px solid var(--mf-fg-dim, #8a8a96);
      }
      #path-bar span {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #viewer {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
        min-height: 0;
      }
      #viewer img,
      #viewer video {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      #viewer pre {
        align-self: stretch;
        flex: 1;
        margin: 0;
        padding: 10px;
        overflow: auto;
        font-family: var(--mf-font-mono, monospace);
        font-size: 0.9em;
        white-space: pre-wrap;
      }
      .placeholder {
        color: var(--mf-fg-dim, #8a8a96);
      }
    </style>
  </head>
  <body>
    <div id="path-bar" hidden></div>
    <div id="viewer"><p class="placeholder">No file selected</p></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
